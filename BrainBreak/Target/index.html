<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Click the Target</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #101820;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    h1 {
      margin-bottom: 5px;
    }

    #info {
      display: flex;
      gap: 25px;
      margin-bottom: 15px;
      font-size: 1.2rem;
    }

    #gameArea {
      width: 600px;
      height: 400px;
      background: #f5f5f5;
      border: 4px solid #35d07f;
      border-radius: 12px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(53, 208, 127, 0.4);
    }

    #target {
      width: 50px;
      height: 50px;
      background: #e63946;
      border-radius: 50%;
      position: absolute;
      cursor: pointer;
      display: none;
      box-shadow: 0 0 12px rgba(230, 57, 70, 0.7);
    }

    #target::after {
      content: "";
      position: absolute;
      width: 24px;
      height: 24px;
      background: white;
      border-radius: 50%;
      top: 13px;
      left: 13px;
    }

    #target::before {
      content: "";
      position: absolute;
      width: 10px;
      height: 10px;
      background: #e63946;
      border-radius: 50%;
      top: 20px;
      left: 20px;
      z-index: 2;
    }

    button {
      margin-top: 15px;
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: #35d07f;
      color: #101820;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #57e99b;
    }

    #message {
      margin-top: 12px;
      font-size: 1.1rem;
      min-height: 25px;
    }
  </style>
</head>

<body>
  <h1>Click the Target</h1>

  <div id="info">
    <div>Score: <span id="score">0</span></div>
    <div>Time: <span id="time">30</span>s</div>
  </div>

  <div id="gameArea">
    <div id="target"></div>
  </div>

  <button onclick="startGame()">Start Game</button>

  <div id="message">Click the target as many times as you can in 30 seconds.</div>

  <script>
    const gameArea = document.getElementById("gameArea");
    const target = document.getElementById("target");
    const scoreDisplay = document.getElementById("score");
    const timeDisplay = document.getElementById("time");
    const message = document.getElementById("message");

    let score = 0;
    let timeLeft = 30;
    let gameRunning = false;
    let timer;

    function startGame() {
      score = 0;
      timeLeft = 30;
      gameRunning = true;

      scoreDisplay.textContent = score;
      timeDisplay.textContent = timeLeft;
      message.textContent = "Go!";
      target.style.display = "block";

      moveTarget();

      clearInterval(timer);
      timer = setInterval(() => {
        timeLeft--;
        timeDisplay.textContent = timeLeft;

        if (timeLeft <= 0) {
          endGame();
        }
      }, 1000);
    }

    function moveTarget() {
      const areaWidth = gameArea.clientWidth;
      const areaHeight = gameArea.clientHeight;
      const targetSize = target.offsetWidth;

      const randomX = Math.floor(Math.random() * (areaWidth - targetSize));
      const randomY = Math.floor(Math.random() * (areaHeight - targetSize));

      target.style.left = randomX + "px";
      target.style.top = randomY + "px";
    }

    target.addEventListener("click", () => {
      if (!gameRunning) return;

      score++;
      scoreDisplay.textContent = score;
      moveTarget();
    });

    function endGame() {
      gameRunning = false;
      clearInterval(timer);
      target.style.display = "none";

      message.textContent = "Game over! Final score: " + score;
    }
  </script>
</body>
</html>
