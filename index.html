<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SciSims</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f7fb;
      color: #1f2937;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 5px;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 20px;
      margin: 16px 0;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    a {
      display: inline-block;
      padding: 10px 16px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    a:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>

  <h1>SciSims</h1>
  <p>A collection of classroom science simulations.</p>
<h2>BioSims</h2>
  <div class="card">
  <h2>Pandemic Simulation</h2>
  <p>Model how an infectious disease can spread through a population.</p>
  <a href="BioSims/Pandemic/">Open sim</a>
</div>
  <h2>ChemSims</h2>
  <div class="card">
    <h2>Element Symbol and Name Matching Game</h2>
    <p>Match chemical symbols to their correct element names.</p>
<a href="ChemSims/Element_Game/">Open sim</a>
  </div>

</body>
</html>
